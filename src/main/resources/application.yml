spring:
  application:
    name: flight-reservation

  # H2 in-memory database
  datasource:
    url: "jdbc:h2:mem:flightdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # H2 console (http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

  # SQL initialization (seed flights from data.sql)
  sql:
    init:
      mode: always

  # JPA / Hibernate
  jpa:
    show-sql: true
    # Run data.sql after Hibernate creates the schema, not before.
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

# Server
server:
  port: 8080

# Booking domain configuration (bound to BookingProperties)
booking:
  hold-duration-minutes: 15
  booking-window-minutes: 45
  hold-expiry-check-interval-ms: 60000
